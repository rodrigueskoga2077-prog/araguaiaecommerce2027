<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Araguaia Máquinas - Loja Oficial</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v4 & Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-araguaia-yellow: #FFB800;
            --color-araguaia-dark: #111111;
            --color-araguaia-darker: #0a0a0a;
        }
    </style>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f4; }
        .font-anton { font-family: 'Anton', sans-serif; letter-spacing: 0.02em; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f4f4f4; }
        ::-webkit-scrollbar-thumb { background: #FFB800; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Top Bar -->
    <div class="bg-araguaia-dark text-center py-1.5 px-4 text-xs sm:text-sm font-semibold tracking-wide">
        <span class="text-white">COMPRE ONLINE COM </span>
        <span class="text-araguaia-yellow">FRETE GRÁTIS</span>
        <span class="text-white"> PARA TODO O BRASIL ACIMA DE R$ 499</span>
    </div>

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <a href="index.html" class="flex-shrink-0">
                    <img src="https://placehold.co/240x60/111111/FFB800?text=ARAGUAIA+MAQUINAS&font=oswald" alt="logo Araguaia" class="h-10 sm:h-12">
                </a>
                
                <!-- Barra de Busca -->
                <div class="w-full max-w-xl relative hidden md:block">
                    <input type="text" placeholder="O que você está procurando?" class="w-full bg-gray-100 border border-transparent focus:border-araguaia-yellow focus:bg-white rounded-full py-2.5 pl-5 pr-12 text-sm outline-none transition-all">
                    <button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-araguaia-yellow">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="flex items-center gap-6 text-araguaia-dark">
                    <a href="index.html" class="flex flex-col items-center hover:text-araguaia-yellow transition-colors">
                        <i data-lucide="home" class="w-6 h-6 stroke-[1.5]"></i>
                        <span class="text-[10px] font-bold uppercase mt-1">Início</span>
                    </a>
                    <a href="#carrinho" class="flex flex-col items-center hover:text-araguaia-yellow transition-colors relative">
                        <i data-lucide="shopping-cart" class="w-6 h-6 stroke-[1.5]"></i>
                        <span class="absolute -top-2 -right-2 bg-araguaia-yellow text-araguaia-dark text-[10px] font-bold h-4 w-4 flex items-center justify-center rounded-full">2</span>
                        <span class="text-[10px] font-bold uppercase mt-1">Carrinho</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow py-8">
        <div class="container mx-auto px-4 max-w-7xl">
            <h2 class="text-2xl md:text-3xl font-anton text-araguaia-dark mb-6 uppercase tracking-wide">Nossos Produtos</h2>
            
            <!-- Aqui o JS vai injetar os produtos -->
            <div id="vitrine-produtos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                <p class="text-gray-500 col-span-full text-center py-10">Carregando produtos...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-araguaia-darker text-gray-400 py-8 border-t-4 border-araguaia-yellow text-center text-sm mt-auto">
        <p>&copy; 2026 Araguaia Máquinas. Todos os direitos reservados.</p>
    </footer>

    <!-- SCRIPT DA LOJA -->
    <script>
        // 1. BANCO DE DADOS
        const produtos = [
            { id: "ms-170", ativo: true, nome: "Motosserra a Combustão MS 170 Sabre 30cm", precoOriginal: "1.149,00", precoDesconto: "976,65", parcelamento: "10x de R$ 97,66 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/6fd46bee-210a-41ae-8fd5-e0e9727472a3.webp", tag: "-15% OFF", tagColor: "bg-red-600", estrelas: 5, avaliacoes: 124 },
            { id: "fs-120", ativo: true, nome: "Roçadeira a Combustão FS 120 Uso Intensivo", precoOriginal: "", precoDesconto: "1.899,00", parcelamento: "10x de R$ 189,90 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/64eabebd-46aa-4bc3-9769-dd229e4024b5.webp", tag: "Lançamento", tagColor: "bg-araguaia-dark", estrelas: 5, avaliacoes: 89 },
            { id: "bg-50", ativo: true, nome: "Soprador Manual a Combustão BG 50 Leve", precoOriginal: "", precoDesconto: "849,00", parcelamento: "10x de R$ 84,90 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/247225da-4595-4d85-a1a3-a28e0f904ef9.webp", tag: "", tagColor: "", estrelas: 4, avaliacoes: 45 },
            { id: "re-90", ativo: true, nome: "Lavadora de Alta Pressão RE 90 Elétrica 110V", precoOriginal: "999,00", precoDesconto: "799,00", parcelamento: "10x de R$ 79,90 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/9e403c40-fb60-4c46-b6ce-1853e3497c53.webp", tag: "Frete Grátis", tagColor: "bg-araguaia-yellow", estrelas: 5, avaliacoes: 210 },
            { id: "rma-460", ativo: true, nome: "Cortador de Grama a Bateria RMA 460", precoOriginal: "", precoDesconto: "2.499,00", parcelamento: "10x de R$ 249,90 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/805bfd2e-0d30-45a5-a732-eb79112f46c9.webp", tag: "", tagColor: "", estrelas: 4, avaliacoes: 32 },
            { id: "oleo-2t", ativo: true, nome: "Óleo Lubrificante 2 Tempos 8017 H 500ml", precoOriginal: "", precoDesconto: "45,90", parcelamento: "À vista no PIX", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/55f42c38-c74e-487c-ae01-0ac4a1092685.webp", tag: "", tagColor: "", estrelas: 5, avaliacoes: 540 },
            { id: "ap-300", ativo: true, nome: "Bateria de Íons de Lítio AP 300 S", precoOriginal: "1.999,00", precoDesconto: "1.749,00", parcelamento: "10x de R$ 174,90 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/f0c516f1-0617-4cee-b0dc-19a5a018c053.webp", tag: "Alta Autonomia", tagColor: "bg-araguaia-dark", estrelas: 5, avaliacoes: 77 },
            { id: "ms-250", ativo: true, nome: "Motosserra a Combustão MS 250 Sabre 40cm", precoOriginal: "", precoDesconto: "1.549,00", parcelamento: "10x de R$ 154,90 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/6fd46bee-210a-41ae-8fd5-e0e9727472a3.webp", tag: "", tagColor: "", estrelas: 4, avaliacoes: 112 },
            { id: "fs-220", ativo: true, nome: "Roçadeira a Combustão FS 220 Profissional", precoOriginal: "2.699,00", precoDesconto: "2.429,10", parcelamento: "10x de R$ 242,91 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/64eabebd-46aa-4bc3-9769-dd229e4024b5.webp", tag: "-10% OFF", tagColor: "bg-red-600", estrelas: 5, avaliacoes: 201 },
            { id: "br-430", ativo: true, nome: "Soprador de Costado BR 430 Potência Máxima", precoOriginal: "", precoDesconto: "2.899,00", parcelamento: "10x de R$ 289,90 s/ juros", imagem: "https://buildix-user-images.s3.us-east-2.amazonaws.com/ai-generated/247225da-4595-4d85-a1a3-a28e0f904ef9.webp", tag: "", tagColor: "", estrelas: 5, avaliacoes: 68 }
        ];

        // 2. FUNÇÃO QUE DESENHA OS PRODUTOS NA TELA
        const container = document.getElementById('vitrine-produtos');
        
        // Cria o HTML para cada produto e junta tudo
        const htmlDosProdutos = produtos.filter(p => p.ativo).map(p => {
            const estrelasCheias = '<i data-lucide="star" class="w-3 h-3 fill-current"></i>'.repeat(p.estrelas);
            const estrelasVazias = '<i data-lucide="star" class="w-3 h-3 text-gray-300"></i>'.repeat(5 - p.estrelas);

            return `
            <article class="bg-white border border-gray-200 p-5 flex flex-col h-full relative group hover:shadow-xl hover:border-araguaia-dark transition-all duration-300">
                ${p.tag ? `<span class="absolute top-4 left-4 ${p.tagColor} text-white text-[10px] font-bold uppercase px-2 py-1 z-10">${p.tag}</span>` : ''}
                
                <!-- LINK NA IMAGEM -->
                <a href="produto.html?id=${p.id}" class="relative w-full aspect-square mb-4 overflow-hidden bg-gray-50 flex items-center justify-center p-4 block">
                    <img src="${p.imagem}" alt="${p.nome}" class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-105">
                </a>
                
                <div class="flex items-center mb-2">
                    <div class="flex text-araguaia-yellow">
                        ${estrelasCheias}${estrelasVazias}
                    </div>
                    <span class="text-[10px] text-gray-500 ml-1">(${p.avaliacoes})</span>
                </div>
                
                <!-- LINK NO TÍTULO -->
                <a href="produto.html?id=${p.id}" class="text-sm font-bold text-gray-800 line-clamp-2 mb-2 min-h-[40px] hover:text-araguaia-yellow cursor-pointer transition-colors block">
                    ${p.nome}
                </a>
                
                <div class="mt-auto pt-4 border-t border-gray-100 flex flex-col">
                    <span class="text-xs ${p.precoOriginal ? 'text-gray-400 line-through' : 'text-white select-none'}">
                        ${p.precoOriginal ? 'R$ ' + p.precoOriginal : 'R$ 0,00'}
                    </span>
                    <span class="font-anton text-2xl text-araguaia-dark tracking-wide">R$ ${p.precoDesconto}</span>
                    <span class="text-[10px] text-gray-500 mb-4">${p.parcelamento}</span>
                    
                    <!-- BOTÃO VER DETALHES -->
                    <a href="produto.html?id=${p.id}" class="w-full border-2 border-araguaia-dark text-araguaia-dark font-bold uppercase py-2.5 text-xs text-center hover:bg-araguaia-dark hover:text-white transition-colors duration-300 block">
                        Ver Detalhes
                    </a>
                </div>
            </article>
            `;
        }).join('');

        // Injeta os produtos na div vazia
        container.innerHTML = htmlDosProdutos;

        // Inicia os ícones
        lucide.createIcons();
    </script>
</body>
</html>
